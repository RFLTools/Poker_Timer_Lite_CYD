[platformio]
default_envs = esp32-2432s028

[env:esp32-2432s028]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
upload_port = COM3
monitor_port = COM3

; Automatically update web flasher files after build
extra_scripts = post:update_web_flasher.py

; Build flags for CYD - USING YOUR EXACT WORKING CONFIG
build_flags = 
    -D CORE_DEBUG_LEVEL=0
    -D USER_SETUP_LOADED=1
    ; TFT_eSPI Configuration for CYD 240x320 ILI9341 display
    -D ILI9341_2_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_INVERSION_ON=1
    ; CYD Pin Configuration
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TFT_BACKLIGHT_ON=HIGH
    ; XPT2046 Resistive Touch Configuration (Separate SPI bus)
    -D TOUCH_CS=33
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_CLK=25
    -D TOUCH_IRQ=36
    -D SPI_TOUCH_FREQUENCY=2500000
    ; Font Configuration
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    ; SPI Frequencies
    -D SPI_FREQUENCY=55000000
    -D SPI_READ_FREQUENCY=20000000

; Filesystem
board_build.filesystem = spiffs
; Use larger partition scheme for app (no OTA)
board_build.partitions = no_ota.csv

; Library dependencies
lib_deps = 
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit GFX Library@^1.11.9
    bblanchon/ArduinoJson@^6.21.5
    https://github.com/T-vK/ESP32-BLE-Keyboard.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
